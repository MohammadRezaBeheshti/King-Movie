<div class="space-y-3">
    {% for review in reviews %}
        <article class="rounded-lg bg-black/25 p-4">
            <div class="flex items-center justify-between gap-3">
                <h3 class="text-sm font-bold text-white">{{ review.user.username }}</h3>
                <time class="text-xs text-white/40">{{ review.created_at|date:"Y/m/d" }}</time>
            </div>
            <p class="mt-3 text-sm leading-7 text-white/68">{{ review.content }}</p>
        </article>
    {% empty %}
        <div class="rounded-lg border border-dashed border-white/15 p-6 text-center text-sm text-white/50">
            هنوز نظری برای این عنوان ثبت نشده است.
        </div>
    {% endfor %}
</div>
