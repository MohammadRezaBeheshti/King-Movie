<div class="space-y-3">
    {% for review in reviews %}
        <article class="rounded-lg bg-[var(--card)] p-4">
            <div class="flex items-center justify-between gap-3">
                <h3 class="text-sm font-bold text-[var(--foreground)]">{{ review.user.username }}</h3>
                <time class="text-xs text-[var(--foreground)]/40">{{ review.created_at|date:"Y/m/d" }}</time>
            </div>
            <p class="mt-3 text-sm leading-7 text-[var(--foreground)]/68">{{ review.content }}</p>
        </article>
    {% empty %}
        <div class="rounded-lg border border-dashed border-[var(--border)] p-6 text-center text-sm text-[var(--foreground)]/50">
            هنوز نظری برای این عنوان ثبت نشده است.
        </div>
    {% endfor %}
</div>
