<form method="post" action="{% url 'interactions:watchlist' media.slug %}">
    {% csrf_token %}
    <button type="submit" class="inline-flex w-full items-center justify-center rounded-lg {% if is_in_watchlist %}bg-white text-black hover:bg-white/85{% else %}border border-white/15 bg-white/10 text-white hover:border-[#eab308]/60 hover:text-[#eab308]{% endif %} px-4 py-2.5 text-sm font-bold transition">
        {% if is_in_watchlist %}
            حذف از لیست تماشا
        {% else %}
            افزودن به لیست تماشا
        {% endif %}
    </button>
</form>
