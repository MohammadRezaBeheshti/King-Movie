<form method="post" action="{% url 'interactions:watchlist' media.slug %}">
    {% csrf_token %}
    <button type="submit" class="inline-flex w-full items-center justify-center rounded-lg {% if is_in_watchlist %}bg-[var(--foreground)] text-[var(--background)] hover:opacity-80{% else %}border border-[var(--border)] bg-[var(--card)] text-[var(--foreground)] hover:border-[var(--primary)]/60 hover:text-[var(--primary)]{% endif %} px-4 py-2.5 text-sm font-bold transition">
        {% if is_in_watchlist %}
            حذف از لیست تماشا
        {% else %}
            افزودن به لیست تماشا
        {% endif %}
    </button>
</form>
