{% if user.is_authenticated %}
    <form method="post" action="{% url 'interactions:review' media.slug %}" class="rounded-lg border border-[var(--border)] bg-[var(--card)] p-4">
        {% csrf_token %}
        <label for="{{ review_form.content.id_for_label }}" class="block text-sm font-black text-[var(--foreground)]">
            {% if user_review %}ویرایش نظر شما{% else %}ثبت نظر شما{% endif %}
        </label>
        <div class="mt-3">
            {{ review_form.content }}
        </div>
        <div class="mt-3 flex flex-wrap gap-3">
            <button type="submit" name="action" value="save" class="rounded-lg bg-[var(--primary)] px-4 py-2 text-sm font-black text-[var(--primary-foreground)] transition hover:bg-[var(--primary-hover)]">
                {% if user_review %}ذخیره تغییرات{% else %}ثبت نظر{% endif %}
            </button>
            {% if user_review %}
                <button type="submit" name="action" value="delete" class="rounded-lg border border-red-400/40 bg-red-500/10 px-4 py-2 text-sm font-bold text-red-200 transition hover:bg-red-500/20">
                    حذف نظر
                </button>
            {% endif %}
        </div>
    </form>
{% else %}
    <div class="rounded-lg border border-dashed border-[var(--border)] bg-[var(--card)] p-5 text-sm text-[var(--foreground)]/55">
        برای ثبت امتیاز یا نظر باید وارد حساب کاربری شوید.
    </div>
{% endif %}
