<form method="post" action="{% url 'interactions:favorite' media.slug %}">
    {% csrf_token %}
    <button type="submit" class="inline-flex w-full items-center justify-center rounded-lg {% if is_favorite %}bg-[var(--primary)] text-[var(--primary-foreground)] hover:bg-[var(--primary-hover)]{% else %}border border-[var(--border)] bg-[var(--card)] text-[var(--foreground)] hover:border-[var(--primary)]/60 hover:text-[var(--primary)]{% endif %} px-4 py-2.5 text-sm font-black transition">
        {% if is_favorite %}
            حذف از علاقه‌مندی‌ها
        {% else %}
            افزودن به علاقه‌مندی‌ها
        {% endif %}
    </button>
</form>
