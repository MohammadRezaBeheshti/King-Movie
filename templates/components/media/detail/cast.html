<section>
    <div class="mb-4 flex items-end justify-between gap-4">
        <div>
            <p class="text-xs font-black uppercase text-[#eab308]">Cast</p>
            <h2 class="mt-1 text-2xl font-black text-white">بازیگران</h2>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">
        {% for actor in media.actors.all %}
            <article class="overflow-hidden rounded-lg border border-white/10 bg-white/[0.04]">
                <div class="aspect-[4/5] bg-white/5">
                    {% if actor.image %}
                        <img src="{{ actor.image.url }}" alt="{{ actor.full_name }}" class="h-full w-full object-cover">
                    {% else %}
                        <div class="flex h-full w-full items-center justify-center text-3xl font-black text-white/25">
                            {{ actor.full_name|first }}
                        </div>
                    {% endif %}
                </div>
                <div class="p-3">
                    <h3 class="truncate text-sm font-bold text-white">{{ actor.full_name }}</h3>
                </div>
            </article>
        {% empty %}
            <div class="col-span-full rounded-lg border border-dashed border-white/15 bg-white/[0.03] p-6 text-center text-sm text-white/50">
                بازیگری برای این عنوان ثبت نشده است.
            </div>
        {% endfor %}
    </div>
</section>
