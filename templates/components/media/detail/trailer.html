<section class="rounded-lg border border-white/10 bg-white/[0.04] p-5 shadow-xl shadow-black/20">
    <div class="mb-5">
        <p class="text-xs font-black uppercase text-[#eab308]">Trailer</p>
        <h2 class="mt-1 text-2xl font-black text-white">تریلر</h2>
    </div>

    {% if media.trailer %}
        <div class="overflow-hidden rounded-lg border border-white/10 bg-black" style="aspect-ratio: 16 / 9;">
            <iframe
                src="{{ media.trailer }}"
                title="تریلر {{ media.persian_title|default:media.title }}"
                class="h-full w-full"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </div>
        <a href="{{ media.trailer }}" target="_blank" rel="noopener" class="mt-3 inline-block text-sm font-bold text-[#eab308] hover:text-[#facc15]">
            باز کردن تریلر
        </a>
    {% else %}
        <div class="rounded-lg border border-dashed border-white/15 p-6 text-center text-sm text-white/50">
            تریلری برای این عنوان ثبت نشده است.
        </div>
    {% endif %}
</section>
