<section class="rounded-lg border border-[var(--border)] bg-[var(--surface)] p-5 shadow-xl">
    <div class="mb-5">
        <p class="text-xs font-black uppercase text-[var(--primary)]">Trailer</p>
        <h2 class="mt-1 text-2xl font-black text-[var(--foreground)]">تریلر</h2>
    </div>

    {% if media.trailer %}
        <div class="overflow-hidden rounded-lg border border-[var(--border)] bg-[var(--card)]" style="aspect-ratio: 16 / 9;">
            <iframe
                src="{{ media.trailer }}"
                title="تریلر {{ media.persian_title|default:media.title }}"
                class="h-full w-full"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </div>
        <a href="{{ media.trailer }}" target="_blank" rel="noopener" class="mt-3 inline-block text-sm font-bold text-[var(--primary)] hover:text-[var(--primary-hover)]">
            باز کردن تریلر
        </a>
    {% else %}
        <div class="rounded-lg border border-dashed border-[var(--border)] p-6 text-center text-sm text-[var(--foreground)]/50">
            تریلری برای این عنوان ثبت نشده است.
        </div>
    {% endif %}
</section>
