<section class="border-b border-[var(--border)] bg-[var(--surface)]">
    <div class="mx-auto grid max-w-7xl gap-6 px-4 py-8 sm:px-6 lg:grid-cols-[1.4fr_1fr] lg:px-8">
        <div class="flex items-center gap-4">
            <div class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full border border-[var(--primary)]/35 bg-[var(--primary)]/10 text-2xl font-black text-[var(--primary)]">
                {{ user.username|first|upper }}
            </div>
            <div class="min-w-0">
                <p class="text-xs font-black uppercase text-[var(--primary)]">Profile</p>
                <h1 class="mt-1 truncate text-2xl font-black text-[var(--foreground)] sm:text-4xl">
                    {{ user.username }}
                </h1>
                <div class="mt-3 flex flex-wrap gap-2 text-xs font-medium text-[var(--foreground)]/60">
                    <span class="rounded-full border border-[var(--border)] bg-[var(--background)] px-3 py-1">{{ user.email|default:"ایمیل ثبت نشده" }}</span>
                    <span class="rounded-full border border-[var(--border)] bg-[var(--background)] px-3 py-1">عضویت از {{ user.date_joined|date:"Y/m/d" }}</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 sm:grid-cols-4 lg:grid-cols-2">
            <div class="rounded-lg border border-[var(--border)] bg-[var(--card)] p-4">
                <p class="text-2xl font-black text-[var(--primary)]">{{ favorite_count }}</p>
                <p class="mt-1 text-xs text-[var(--foreground)]/60">علاقه مندی</p>
            </div>
            <div class="rounded-lg border border-[var(--border)] bg-[var(--card)] p-4">
                <p class="text-2xl font-black text-[var(--primary)]">{{ watchlist_count }}</p>
                <p class="mt-1 text-xs text-[var(--foreground)]/60">لیست تماشا</p>
            </div>
            <div class="rounded-lg border border-[var(--border)] bg-[var(--card)] p-4">
                <p class="text-2xl font-black text-[var(--primary)]">{{ rating_count }}</p>
                <p class="mt-1 text-xs text-[var(--foreground)]/60">امتیاز</p>
            </div>
            <div class="rounded-lg border border-[var(--border)] bg-[var(--card)] p-4">
                <p class="text-2xl font-black text-[var(--primary)]">{{ review_count }}</p>
                <p class="mt-1 text-xs text-[var(--foreground)]/60">نقد و نظر</p>
            </div>
        </div>
    </div>
</section>
