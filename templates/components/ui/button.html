{% if href %}
    <a href="{{ href }}" class="inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm font-bold transition focus:outline-none focus:ring-2 focus:ring-[var(--primary)]/60 {% if variant == 'primary' %}bg-[var(--primary)] text-[var(--primary-foreground)] hover:bg-[var(--primary-hover)]{% else %}border border-[var(--border)] bg-[var(--surface)] text-[var(--foreground)] hover:border-[var(--primary)]/60 hover:text-[var(--primary)]{% endif %}">
        {{ label|default:"مشاهده" }}
    </a>
{% else %}
    <button type="{{ type|default:'button' }}" class="inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm font-bold transition focus:outline-none focus:ring-2 focus:ring-[var(--primary)]/60 {% if variant == 'primary' %}bg-[var(--primary)] text-[var(--primary-foreground)] hover:bg-[var(--primary-hover)]{% else %}border border-[var(--border)] bg-[var(--surface)] text-[var(--foreground)] hover:border-[var(--primary)]/60 hover:text-[var(--primary)]{% endif %}">
        {{ label|default:"انجام" }}
    </button>
{% endif %}
