{% if href %}
    <a href="{{ href }}" class="inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm font-bold transition focus:outline-none focus:ring-2 focus:ring-[#eab308]/60 {% if variant == 'primary' %}bg-[#eab308] text-black hover:bg-[#facc15]{% else %}border border-[var(--border)] bg-[var(--surface)] text-[var(--foreground)] hover:border-[#eab308]/60 hover:text-[#eab308]{% endif %}">
        {{ label|default:"مشاهده" }}
    </a>
{% else %}
    <button type="{{ type|default:'button' }}" class="inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm font-bold transition focus:outline-none focus:ring-2 focus:ring-[#eab308]/60 {% if variant == 'primary' %}bg-[#eab308] text-black hover:bg-[#facc15]{% else %}border border-[var(--border)] bg-[var(--surface)] text-[var(--foreground)] hover:border-[#eab308]/60 hover:text-[#eab308]{% endif %}">
        {{ label|default:"انجام" }}
    </button>
{% endif %}
