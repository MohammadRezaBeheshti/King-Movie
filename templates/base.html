{% load static %}
{% load vite %}
<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}King Movie{% endblock %}</title>
    <script>
      (function () {
        var key = "king-movie-theme";
        var storedTheme = null;
        try {
          storedTheme = localStorage.getItem(key);
        } catch (error) {}
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = storedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.classList.add(theme);
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    {% vite_css "frontend/js/app.js" as css_file %}

    {% if css_file %}
    <link rel="stylesheet" href="{% static css_file %}">
    {% endif %}
    {% vite_asset "frontend/js/app.js" as js_file %}
  </head>
  <body>
    {% block layout %}{% endblock %}
    <script type="module" src="{% static js_file %}"></script>
  </body>
</html>
